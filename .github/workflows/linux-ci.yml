name: Linux CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libgl1-mesa-dev clang-format

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          modules: 'qtdeclarative'
          cache: true

      - name: Configure
        run: cmake --preset tests

      - name: Build
        run: cmake --build --preset tests

      - name: Test
        run: ctest --preset tests

      - name: Format check
        run: |
          find apps core tests -type f \( -name '*.cpp' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror
