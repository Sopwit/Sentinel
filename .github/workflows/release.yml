name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            qt-arch: linux_gcc_64
            artifact-name: sentinel-desktop-linux-x64.tar.gz
          - os: macos-14
            qt-arch: clang_64
            artifact-name: sentinel-desktop-macos-arm64.dmg
          - os: windows-2022
            qt-arch: win64_msvc2019_64
            artifact-name: sentinel-desktop-windows-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Get App Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -oE 'SENTINEL_APP_VERSION "[^"]+"' CMakeLists.txt | cut -d'"' -f2)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libgl1-mesa-dev libvulkan-dev clang-format fonts-noto-core rpm

      - name: Set up Developer Command Prompt (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: ${{ matrix.qt-arch }}
          cache: true

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=dist

      - name: Build and Install
        run: |
          cmake --build build --target install

      - name: Bundle and Package (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # 1. Create standard portable tarball
          tar -czvf Sentinel-Desktop-Linux-${{ env.APP_VERSION }}.tar.gz -C dist .

          # 2. Build DEB and RPM packages using CPack
          cpack --config build/CPackConfig.cmake
          mv sentinel-desktop-*Linux.deb Sentinel-Desktop-Linux-${{ env.APP_VERSION }}.deb || mv sentinel-desktop-*.deb Sentinel-Desktop-Linux-${{ env.APP_VERSION }}.deb || true
          mv sentinel-desktop-*Linux.rpm Sentinel-Desktop-Fedora-${{ env.APP_VERSION }}.rpm || mv sentinel-desktop-*.rpm Sentinel-Desktop-Fedora-${{ env.APP_VERSION }}.rpm || true

          # 3. Build AppImage using linuxdeploy and linuxdeploy-plugin-qt
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          export QMAKE="${QT_ROOT_DIR}/bin/qmake"
          export LD_LIBRARY_PATH="${QT_ROOT_DIR}/lib:${LD_LIBRARY_PATH}"
          export PATH="${QT_ROOT_DIR}/bin:${PATH}"

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir dist \
            -e dist/bin/sentinel-desktop \
            -d dist/share/applications/dev.sentinel.Sentinel.desktop \
            -i dist/share/icons/hicolor/scalable/apps/dev.sentinel.Sentinel.svg \
            --plugin qt \
            --output appimage

          mv Sentinel_Desktop-*.AppImage Sentinel-Desktop-Linux-${{ env.APP_VERSION }}.AppImage || mv Sentinel-Desktop-*.AppImage Sentinel-Desktop-Linux-${{ env.APP_VERSION }}.AppImage || true

      - name: Bundle and Package (macOS)
        if: matrix.os == 'macos-14'
        run: |
          # Note: To enable macOS Code Signing and Notarization, add development certs to the runner and run:
          # macdeployqt dist/sentinel-desktop.app -qmldir=ui/qml -codesign="Developer ID Application: YourOrg (TeamID)" -timestamp -dmg
          macdeployqt dist/sentinel-desktop.app -qmldir=ui/qml -dmg
          mv sentinel-desktop.dmg Sentinel-Desktop-macOS-${{ env.APP_VERSION }}.dmg || mv dist/sentinel-desktop.dmg Sentinel-Desktop-macOS-${{ env.APP_VERSION }}.dmg || true

      - name: Bundle and Package (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          # 1. Zip portable files (windeployqt ran automatically during target install)
          Compress-Archive -Path dist/* -DestinationPath Sentinel-Desktop-Windows-${env:APP_VERSION}.zip
 
          # 2. Build MSI and EXE installers using CPack
          cpack --config build/CPackConfig.cmake
          Get-ChildItem Sentinel-Desktop-*.exe | Rename-Item -NewName "Sentinel-Desktop-Windows-${env:APP_VERSION}.exe" -ErrorAction SilentlyContinue
          Get-ChildItem Sentinel_Desktop-*.msi | Rename-Item -NewName "Sentinel-Desktop-Windows-${env:APP_VERSION}.msi" -ErrorAction SilentlyContinue
          
          # Note: To enable Windows Code Signing, sign the built binaries using signtool:
          # signtool sign /f cert.pfx /p "${{ secrets.WIN_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 build/Sentinel-Desktop-*.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-artifact
          path: |
            Sentinel-Desktop-*
            sentinel-desktop-*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p final-artifacts
          find release-artifacts -type f -iname "sentinel-desktop-*" -exec cp {} final-artifacts/ \;
          ls -R final-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: final-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
