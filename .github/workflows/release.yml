name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            qt-arch: linux_gcc_64
            artifact-name: sentinel-desktop-linux-x64.tar.gz
          - os: macos-14
            qt-arch: clang_64
            artifact-name: sentinel-desktop-macos-arm64.dmg
          - os: windows-2022
            qt-arch: win64_msvc2019_64
            artifact-name: sentinel-desktop-windows-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ libgl1-mesa-dev libvulkan-dev clang-format fonts-noto-core rpm

      - name: Set up Developer Command Prompt (Windows)
        if: matrix.os == 'windows-2022'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: ${{ matrix.qt-arch }}
          cache: true

      - name: Configure CMake
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=dist

      - name: Build and Install
        run: |
          cmake --build build --target install

      - name: Bundle and Package (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          # 1. Create standard portable tarball
          tar -czvf sentinel-desktop-linux-x64.tar.gz -C dist .

          # 2. Build DEB and RPM packages using CPack
          cpack --config build/CPackConfig.cmake

          # 3. Build AppImage using linuxdeploy and linuxdeploy-plugin-qt
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          export QMAKE="${QT_PATH}/bin/qmake"
          export LD_LIBRARY_PATH="${QT_PATH}/lib:${LD_LIBRARY_PATH}"
          export PATH="${QT_PATH}/bin:${PATH}"

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir dist \
            --plugin qt \
            --output appimage

          mv Sentinel_Desktop-*.AppImage sentinel-desktop-linux-x86_64.AppImage || mv Sentinel-Desktop-*.AppImage sentinel-desktop-linux-x86_64.AppImage || true

      - name: Bundle and Package (macOS)
        if: matrix.os == 'macos-14'
        run: |
          macdeployqt dist/sentinel-desktop.app -qmldir=ui/qml -dmg
          mv sentinel-desktop.dmg sentinel-desktop-macos-arm64.dmg || mv dist/sentinel-desktop.dmg sentinel-desktop-macos-arm64.dmg || true

      - name: Bundle and Package (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          windeployqt dist/bin/sentinel-desktop.exe --qmldir ui/qml --compiler-runtime
          Compress-Archive -Path dist/* -DestinationPath sentinel-desktop-windows-x64.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifact
          path: sentinel-desktop-*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten directory structure
        run: |
          mkdir -p final-artifacts
          find release-artifacts -type f -name "sentinel-desktop-*" -exec cp {} final-artifacts/ \;
          ls -R final-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: final-artifacts/sentinel-desktop-*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
